<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>封鎖小工具</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Noto+Sans+TC:wght@400;700&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --muted: #555;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }

  .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 2rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 12px;
    text-align: center;
    line-height: 1.3;
  }

  .desc {
    font-size: 0.85rem;
    color: var(--muted);
    text-align: center;
    line-height: 1.7;
    margin-bottom: 48px;
    max-width: 340px;
  }

  .cards {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    max-width: 420px;
  }

  .card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 28px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: var(--surface);
    text-decoration: none;
    transition: all 0.2s;
    cursor: pointer;
  }

  .card:hover {
    transform: translateY(-2px);
  }

  .card-ig {
    border-top: 3px solid #ff3c3c;
  }
  .card-ig:hover {
    border-color: #ff3c3c;
    box-shadow: 0 8px 32px rgba(255,60,60,0.15);
  }

  .card-threads {
    border-top: 3px solid #fff;
  }
  .card-threads:hover {
    border-color: #fff;
    box-shadow: 0 8px 32px rgba(255,255,255,0.08);
  }

  .card-left { display: flex; flex-direction: column; gap: 6px; }

  .card-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .card-ig .card-tag { color: #ff3c3c; }
  .card-threads .card-tag { color: #888; }

  .card-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.2rem;
    font-weight: 600;
    color: #fff;
  }

  .card-sub {
    font-size: 0.75rem;
    color: var(--muted);
  }

  .card-arrow {
    font-size: 1.4rem;
    color: var(--muted);
    transition: transform 0.2s, color 0.2s;
  }

  .card:hover .card-arrow {
    transform: translateX(4px);
    color: #fff;
  }

  .footer {
    margin-top: 48px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.08em;
    line-height: 1.8;
  }
</style>
</head>
<body>

<div class="logo">Block Helper</div>
<h1>封鎖小工具</h1>
<p class="desc">貼上帳號清單，快速逐一封鎖<br>所有資料只在你的瀏覽器處理<br>不會上傳或儲存任何資訊</p>

<div class="cards">
  <a class="card card-ig" href="block-helper-ig-v2.html">
    <div class="card-left">
      <span class="card-tag">// Instagram</span>
      <span class="card-title">IG 封鎖工具</span>
      <span class="card-sub">點帳號直接開啟 IG 頁面</span>
    </div>
    <span class="card-arrow">→</span>
  </a>

  <a class="card card-threads" href="block-helper-threads-v2.html">
    <div class="card-left">
      <span class="card-tag">// Threads</span>
      <span class="card-title">Threads 封鎖工具</span>
      <span class="card-sub">點帳號直接開啟 Threads 頁面</span>
    </div>
    <span class="card-arrow">→</span>
  </a>
</div>

<div class="footer">
  貼上名單 → 點帳號開啟頁面 → 封鎖 → 下一個<br>
  鍵盤快捷鍵：← → 切換　C 複製　Enter 標記完成
</div>

</body>
</html>
